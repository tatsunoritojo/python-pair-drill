<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<meta name="description" content="Gemini APIを使ったPython試験対策AIアシスタント。あなたの誤答癖プロファイルを踏まえた個別解説を返す。">
<title>学習アシスタント · Python ペアドリル</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<meta property="og:type" content="website">
<meta property="og:url" content="https://tatsunoritojo.github.io/python-pair-drill/assistant.html">
<meta property="og:title" content="学習アシスタント · Python ペアドリル">
<meta property="og:description" content="Gemini APIを使った Python 学習アシスタント。誤答癖を踏まえた個別解説。">
<meta property="og:image" content="https://tatsunoritojo.github.io/python-pair-drill/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="ja_JP">

<meta name="twitter:image" content="https://tatsunoritojo.github.io/python-pair-drill/og-image.png">

<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>学習アシスタント</h1>
  <nav class="header-nav" aria-label="メインナビゲーション">
    <a href="index.html" class="nav-link">ドリル</a>
    <a href="logic.html" class="nav-link">ロジック</a>
    <a href="exam.html" class="nav-link">模試</a>
    <a href="assistant.html" class="nav-link active" aria-current="page">AI</a>
  </nav>
  <button id="theme-toggle" class="btn-icon" aria-label="テーマ切替">🌙</button>
</header>
<main>
  <section id="setup-screen" class="screen active">
    <div class="card">
      <h2>初期設定</h2>
      <p class="lead">Gemini API キーを入力してください。キーはあなたのブラウザ内（localStorage）にだけ保存され、外部に送信されません。</p>

      <div class="form-group">
        <label for="user-name">呼んでほしい名前（任意）</label>
        <input type="text" id="user-name" placeholder="例: 山田 / 太郎 など。空欄で「あなた」呼び" autocomplete="off" />
        <small class="muted">アシスタントがこの名前で呼びかけます。空欄でも問題ありません。</small>
      </div>

      <div class="form-group">
        <label for="api-key">Gemini API キー</label>
        <input type="password" id="api-key" placeholder="AIzaSy..." autocomplete="off" />
        <small class="muted">取得は <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a> から無料。</small>
      </div>

      <div class="form-group">
        <label for="model-select">モデル</label>
        <select id="model-select">
          <option value="gemini-2.0-flash">Gemini 2.0 Flash（推奨・高速・無料枠大きめ）</option>
          <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash Lite（さらに軽量）</option>
          <option value="gemini-1.5-flash">Gemini 1.5 Flash（旧版）</option>
        </select>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="use-context" checked>
          <span>あなたの誤答癖プロファイルを文脈として渡す</span>
        </label>
        <small class="muted">ドリル統計から弱点concept集計を生成し、システムプロンプトに自動で含めて、個別最適化された解説を返してもらいます。</small>
      </div>

      <button class="btn-primary" id="setup-save-btn">設定を保存して始める</button>
    </div>
  </section>

  <section id="chat-screen" class="screen">
    <div class="card chat-card">
      <div class="chat-header">
        <h2>チャット</h2>
        <button class="btn-icon" id="chat-settings-btn" aria-label="設定">⚙️</button>
      </div>

      <div id="chat-messages" class="chat-messages" role="log" aria-live="polite"></div>

      <form id="chat-form" class="chat-form">
        <textarea id="chat-input" placeholder="質問を入力（Enterで送信、Shift+Enterで改行）" rows="2" aria-label="メッセージ入力"></textarea>
        <button class="btn-primary" type="submit" id="chat-send-btn">送信</button>
      </form>

      <div class="chat-actions">
        <button class="btn-secondary" id="chat-clear-btn">履歴クリア</button>
        <button class="btn-secondary" id="chat-suggest-btn">質問例</button>
      </div>
    </div>
  </section>
</main>
<footer>
  <small>Python ペアドリル · API キーはブラウザ内のみに保存 · <a href="https://github.com/tatsunoritojo/python-pair-drill" target="_blank" rel="noopener">GitHub</a></small>
</footer>
<script src="questions.js"></script>
<script src="concepts.js"></script>
<script src="assistant.js"></script>
</body>
</html>
