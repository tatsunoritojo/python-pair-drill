<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装飾的な大きい円 -->
  <circle cx="1050" cy="120" r="180" fill="#ffffff" opacity="0.06"/>
  <circle cx="100" cy="540" r="220" fill="#ffffff" opacity="0.05"/>

  <!-- ロゴアイコン（左上） -->
  <rect x="80" y="80" width="100" height="100" rx="22" fill="#ffffff" opacity="0.15"/>
  <text x="130" y="153" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="64" font-weight="800" text-anchor="middle" fill="#ffffff">P</text>
  <circle cx="160" cy="105" r="10" fill="url(#accent)"/>

  <!-- メインタイトル -->
  <text x="80" y="320" font-family="-apple-system, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', system-ui, sans-serif" font-size="80" font-weight="800" fill="#ffffff">Python ペアドリル</text>

  <!-- サブタイトル -->
  <text x="80" y="385" font-family="-apple-system, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', system-ui, sans-serif" font-size="32" font-weight="500" fill="#bfdbfe">Python3 エンジニア認定基礎試験 学習ツール</text>

  <!-- 機能ハイライト -->
  <g font-family="-apple-system, 'Segoe UI', 'Hiragino Sans', system-ui, sans-serif" font-size="22" fill="#ffffff">
    <rect x="80" y="450" width="160" height="50" rx="25" fill="#ffffff" opacity="0.18"/>
    <text x="160" y="482" text-anchor="middle">1問1答ドリル</text>

    <rect x="260" y="450" width="180" height="50" rx="25" fill="#ffffff" opacity="0.18"/>
    <text x="350" y="482" text-anchor="middle">コードトレース</text>

    <rect x="460" y="450" width="140" height="50" rx="25" fill="#ffffff" opacity="0.18"/>
    <text x="530" y="482" text-anchor="middle">模擬試験</text>

    <rect x="620" y="450" width="180" height="50" rx="25" fill="#ffffff" opacity="0.18"/>
    <text x="710" y="482" text-anchor="middle">AIアシスタント</text>
  </g>

  <!-- フッター情報 -->
  <text x="80" y="570" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" fill="#bfdbfe" opacity="0.8">tatsunoritojo.github.io/python-pair-drill</text>

  <!-- アクセント -->
  <rect x="80" y="595" width="80" height="4" rx="2" fill="url(#accent)"/>
</svg>
